      <g fill="#0f1b1d" fill-opacity="0.15">
        <rect x="30" y="120" width="200" height="8" rx="4" />
        <rect x="30" y="140" width="360" height="16" rx="4" fill-opacity="0.08" />
        <rect x="30" y="180" width="180" height="8" rx="4" />
