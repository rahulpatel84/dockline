  <circle cx="1050" cy="130" r="140" fill="#ff6a5b" fill-opacity="0.35" />
  <circle cx="1050" cy="130" r="98" fill="#ff6a5b" fill-opacity="0.55" />
  <circle cx="1050" cy="130" r="56" fill="#ff6a5b" fill-opacity="0.85" />
    
  <g fill="#faf5ec" fill-opacity="0.15">
