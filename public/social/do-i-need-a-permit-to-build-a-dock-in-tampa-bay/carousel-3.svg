      <rect x="0" y="0" width="480" height="80" fill="#0c3b46" fill-opacity="0.85" />
      <text x="30" y="52" font-family="'Fraunces', serif" font-size="24" fill="#faf5ec" font-weight="700" letter-spacing="4">PERMIT · TAMPA BAY</text>

