      <text x="0" y="-12" font-family="'Fraunces', serif" font-size="34" fill="#ff6a5b" font-weight="900" text-anchor="middle" letter-spacing="4">APPROVED</text>
      <text x="0" y="20" font-family="'Hanken Grotesk', sans-serif" font-size="14" fill="#ff6a5b" font-weight="700" text-anchor="middle" letter-spacing="3">HILLSBOROUGH · 2026</text>
      <path d="M -60 45 L 60 45" stroke="#ff6a5b" stroke-width="2" />
    </g>

    <!-- Small dock silhouette at bottom -->
    <g transform="translate(0 490)" fill="#faf5ec" fill-opacity="0.45">
