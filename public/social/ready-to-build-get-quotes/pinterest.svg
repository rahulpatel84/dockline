<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1500" role="img" aria-label="You&apos;re Ready to Build. Now What?">
  <rect width="1000" height="1500" fill="#062a34" />
  <!-- top: scene inside a card -->
  <g transform="translate(40 130)">
    <clipPath id="pinclip-ready-to-build-get-quotes">
      <rect x="0" y="0" width="920" height="720" rx="26" />
    </clipPath>
    <g clip-path="url(#pinclip-ready-to-build-get-quotes)">
      <g transform="translate(0 -70) scale(0.77 1.4)">
    <rect width="1200" height="630" fill="#062a34" />
    
  <circle cx="180" cy="110" r="120" fill="#3aa681" fill-opacity="0.35" />
  <circle cx="180" cy="110" r="84" fill="#3aa681" fill-opacity="0.55" />
  <circle cx="180" cy="110" r="48" fill="#3aa681" fill-opacity="0.85" />
    <ellipse cx="600" cy="70" rx="700" ry="130" fill="#3aa681" fill-opacity="0.15" />

    <!-- water -->
    <rect x="0" y="360" width="1200" height="270" fill="#ff6a5b" fill-opacity="0.35" />
    
  <g fill="#faf5ec" fill-opacity="0.2">
    <path d="M0 470 Q 150 445 300 470 T 600 470 T 900 470 T 1200 470 L 1200 630 L 0 630 Z" />
  </g>
  <g fill="#faf5ec" fill-opacity="0.12">
    <path d="M0 490 Q 150 465 300 490 T 600 490 T 900 490 T 1200 490 L 1200 630 L 0 630 Z" />
  </g>

    <!-- Left: finished dock section -->
    <g>
      <rect x="0" y="340" width="480" height="25" fill="#faf5ec" />
      <g stroke="#0f1b1d" stroke-opacity="0.28" stroke-width="1.5">
        <line x1="60" y1="340" x2="60" y2="365" />
        <line x1="120" y1="340" x2="120" y2="365" />
        <line x1="180" y1="340" x2="180" y2="365" />
        <line x1="240" y1="340" x2="240" y2="365" />
        <line x1="300" y1="340" x2="300" y2="365" />
        <line x1="360" y1="340" x2="360" y2="365" />
        <line x1="420" y1="340" x2="420" y2="365" />
      </g>
      <rect x="70" y="365" width="10" height="180" fill="#0f1b1d" fill-opacity="0.65" />
      <rect x="230" y="365" width="10" height="180" fill="#0f1b1d" fill-opacity="0.65" />
      <rect x="390" y="365" width="10" height="180" fill="#0f1b1d" fill-opacity="0.65" />
    </g>

    <!-- Middle: framing (no decking yet) -->
    <g stroke="#0f1b1d" stroke-opacity="0.6" stroke-width="4" fill="none">
      <line x1="480" y1="345" x2="800" y2="345" />
      <line x1="480" y1="360" x2="800" y2="360" />
      <line x1="510" y1="345" x2="510" y2="365" />
      <line x1="560" y1="345" x2="560" y2="365" />
      <line x1="610" y1="345" x2="610" y2="365" />
      <line x1="660" y1="345" x2="660" y2="365" />
      <line x1="710" y1="345" x2="710" y2="365" />
      <line x1="760" y1="345" x2="760" y2="365" />
    </g>
    <rect x="540" y="365" width="10" height="180" fill="#0f1b1d" fill-opacity="0.65" />
    <rect x="700" y="365" width="10" height="180" fill="#0f1b1d" fill-opacity="0.65" />

    <!-- Right: piling being driven -->
    <g>
      <rect x="890" y="200" width="14" height="345" fill="#0f1b1d" fill-opacity="0.75" />
      <!-- piling driver hammer -->
      <g transform="translate(880 180)">
        <rect x="0" y="0" width="34" height="50" fill="#ff6a5b" />
        <rect x="4" y="4" width="26" height="10" fill="#062a34" />
        <rect x="4" y="20" width="26" height="10" fill="#062a34" />
        <rect x="4" y="36" width="26" height="10" fill="#062a34" />
      </g>
      <!-- guide rails -->
      <line x1="864" y1="140" x2="864" y2="360" stroke="#ff6a5b" stroke-width="4" />
      <line x1="930" y1="140" x2="930" y2="360" stroke="#ff6a5b" stroke-width="4" />
      <line x1="864" y1="140" x2="930" y2="140" stroke="#ff6a5b" stroke-width="4" />
      <!-- cable -->
      <line x1="897" y1="140" x2="897" y2="80" stroke="#0f1b1d" stroke-opacity="0.6" stroke-width="2" />
      <circle cx="897" cy="80" r="10" fill="#0f1b1d" fill-opacity="0.65" />
    </g>

    <!-- Toolbox in foreground -->
    <g transform="translate(1000 480)">
      <rect x="0" y="0" width="140" height="70" rx="6" fill="#ff6a5b" />
      <rect x="10" y="15" width="120" height="8" fill="#062a34" fill-opacity="0.3" />
      <path d="M 55 0 Q 70 -30 85 0" stroke="#0f1b1d" stroke-width="6" fill="none" stroke-linecap="round" />
      <!-- hammer sticking out -->
      <g transform="translate(50 -15) rotate(-30)">
        <rect x="0" y="0" width="6" height="55" fill="#8a5a35" />
        <rect x="-8" y="-3" width="24" height="14" rx="2" fill="#0f1b1d" fill-opacity="0.75" />
      </g>
    </g>

    <!-- Big "OK" checkmark badge (left section done) -->
    <g transform="translate(240 260)">
      <circle r="42" fill="#3aa681" />
      <path d="M -18 0 L -6 14 L 20 -14" stroke="#faf5ec" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" />
    </g></g>
    </g>
  </g>
  <!-- caption band -->
  <g transform="translate(40 920)">
    <text font-family="'Hanken Grotesk', sans-serif" font-size="26" fill="#faf5ec" fill-opacity="0.75" letter-spacing="6" font-weight="700">GETTING STARTED</text>
    <text y="60" font-family="'Fraunces', serif" font-size="64" fill="#faf5ec" font-weight="700">
      <tspan x="0" dy="0">You&apos;re Ready to</tspan><tspan x="0" dy="72">Build. Now What?</tspan>
    </text>
  </g>
  <g transform="translate(40 1350)">
    <rect width="250" height="70" rx="35" fill="#ff6a5b" />
    <text x="125" y="47" font-family="'Fraunces', serif" font-size="24" fill="#062a34" font-weight="900" text-anchor="middle">Save + Read</text>
  </g>
  <text x="960" y="1470" font-family="'Fraunces', serif" font-size="24" fill="#faf5ec" fill-opacity="0.75" font-weight="700" text-anchor="end">MyDockGuide</text>
</svg>